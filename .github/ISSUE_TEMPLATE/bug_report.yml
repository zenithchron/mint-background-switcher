name: Bug report
description: Report a problem with Mint Background Switcher
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove private image paths or personal details from logs before posting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, commit SHA, or branch.
    validations:
      required: true
  - type: input
    id: mint-version
    attributes:
      label: Linux Mint/Cinnamon version
      placeholder: "Linux Mint 22.x, Cinnamon 6.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/output
      description: Include command output or startup.log after removing private paths.
      render: shell
